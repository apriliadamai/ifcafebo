<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>WELCOME TO CAFE</title>
</head>
<body class="bg-white font-sans">

    <!--Navbar-->
    <div class ="w-full bg-white border-b-4 border-green-800 fixed">

        <div class="flex items-center justify-between px-10 py-5">
        
    <!--LEFT-->
    <div class="flex items-center gap-3">
        <img src="logo.png" class="h-12">
        <span class="text-2xl font-semibold text-amber-800">WELCOME TO CAFE</span>
    </div>

    <!--MENU-->
    <ul class="flex gap-10 text-amber-800 text-lg">
        <li><a href="Cafe.html" class="hover:text-green-800">HOME</a></li>
        <li><a href="makanan.html" class="hover:text-green-800">MENU MAKANAN</a></li>
        <li><a href="minuman.html" class="hover:text-green-800">MENU MINUMAN</a></li>
        <li><a href="reservasi.html" class="hover:text-green-800">RESERVASI</a></li>
        <li><a href="location.html" class="hover:text-green-800">LOCATION CAFE</a></li>
    </ul>

        </div>
    </div>

    <!--CONTENT-->
    <div class="pt-32 px-10">
        <h1 class="text-4xl font-bold text-center text-amber-800 mb-10">MENU MAKANAN</h1>

        <div id="makanan" class="grid md:grid-cols-2 gap-10">

            <!--Menu Makanan 1-->
            <div onclick="addToCart('Nasi Goreng', 20000)"
             class="cursor-pointer shadow-xl rounded-xl p-5 text-center hover:scale-105 transition">

             <img src="nasi goreng jeppang.jpeg"
             class="h-48 w-full object-cover mb-4 rounded">

             <h2 class="text-xl font-semibold">Nasi Goreng</h2>
             <p class="text-gray-500">Nasi Goreng dengan telur & Ayam</p>
             <p class="mt-2 font-bold text-green-700">Rp 20.000</p>
            </div>

    
            <!--Menu Makanan 2-->
            <div onclick="addToCart('Chicken Katsu', 25000)"
             class="cursor-pointer shadow-xl rounded-xl p-5 text-center hover:scale-105 transition">
             
             <img src="ayam jepang.webp"
             class="h-48 w-full object-cover mb-4 rounded">

             <h2 class="text-xl font-semibold">Chicken Katasu</h2>
             <p class="text-gray-500">Ayam crispy dengan saus khas jepang</p>
             <p class="mt-2 font-bold text-green-700">Rp 25.000</p>
            </div>
        </div>
    </div>

    <!--KERANJANG-->
    <div class="fixed bottom-5 right-5 bg-white shadow-xl p-5 rounded-xl w-64">
        <h2 class="font-bold mb-2">keranjang</h2>
        <ul id="cart-list" class="text-sm mb-2"></ul>
        <p class="font-semibold">Total:Rp<span id="total">0</span></p>
    </div>

    <!--SCRIPT-->
    <script>
        let cart = [];
        let total = 0;

        function addToCart(name,price){
            cart.push({name,price});
            total+= price;
            updateCart();
        }

        function updateCart(){
            const list = document.getElementById("cart-list");
            const totalEI = document.getElementById("total");

            list.innerHTML = "";

            cart.forEach((item, index) =>{
                let li = document.createElement("li");

                li.innerHTML = `
                    ${item.name} - Rp.${item.price}
                    <button onclick="removeItem(${index})"
                    class="ml-2 text-red-500 hover:text-red-700">❌</button>
                `;
                list.appendChild(li);

            });
            totalEI.textContent = total;

            window.removeItem = function(index){
                total -= cart[index].price;
                cart.splice(index, 1);
                updateCart();
            }
        }
    </script>
    
</body>
</html>
